<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation:float 8s linear infinite;
    opacity:.6;
}

@keyframes float{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-100px); }
}

.card{
    width:90%;
    max-width:700px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    text-align:center;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    position:relative;
}

h1{
    font-family:'Dancing Script',cursive;
    font-size:4rem;
    margin-bottom:15px;
}

p{
    line-height:1.8;
    font-size:1.1rem;
}

.question{
    margin-top:30px;
    font-size:2rem;
    font-weight:bold;
}

.buttons{
    margin-top:30px;
    position:relative;
    height:220px;
}

button{
    border:none;
    padding:15px 35px;
    font-size:1.1rem;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
    position:absolute;
}

#yesBtn{
    background:white;
    color:#ff4f81;
    font-weight:bold;
    left:20%;
    top:40px;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:#ff4f81;
    color:white;
    left:60%;
    top:40px;
}

/* mobile */
@media (max-width:600px){
    h1{ font-size:2.5rem; }
    .question{ font-size:1.5rem; }
    button{ font-size:1rem; padding:12px 25px; }
}

</style>
</head>

<body>

<div class="card">

    <h1>To My Favorite Person ❤️</h1>

    <p>
        We may still be figuring things out,
        but every day I spend talking to you
        makes me smile a little more.
        <br><br>

        You've become someone I genuinely look forward to.
        Someone who makes ordinary days feel special.
        Someone worth taking a chance on.
    </p>

    <div class="question">
        Will you be my girlfriend? 🌹
    </div>

    <div class="buttons">
        <button id="yesBtn">YES ❤️</button>
        <button id="noBtn">NO 😭</button>
    </div>

</div>

<script>

// floating hearts
for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*5+5)+"s";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    document.body.appendChild(heart);
}

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

let count = 0;

const texts = [
    "NO 😭",
    "Wait 🥺",
    "Are you sure? 😳",
    "Think again ❤️",
    "You can't escape 😝",
    "Just say YES 🥹"
];

// keep inside CARD area
function moveNo(){

    count++;

    const card = document.querySelector(".card");
    const rect = card.getBoundingClientRect();

    const maxX = rect.width - noBtn.offsetWidth;
    const maxY = rect.height - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    if(count < texts.length){
        noBtn.innerHTML = texts[count];
    }

    yesBtn.style.transform = `scale(${1 + count * 0.05})`;

    if(count === 5){
        document.querySelector(".question").innerHTML =
        "You're really trying huh 😏❤️";
    }
}

// desktop + mobile support
noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNo();
});

yesBtn.addEventListener("click", () => {

    document.body.innerHTML = `
    <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        color:white;
        text-align:center;
        font-family:Poppins;
        background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
        padding:30px;
    ">

        <h1 style="
            font-family:'Dancing Script';
            font-size:5rem;
        ">
        She Said YES! ❤️
        </h1>

        <p style="max-width:700px;font-size:1.3rem;line-height:2;">
        Thank you for taking a chance on us.
        I’d love to keep choosing you every day. ❤️
        </p>

        <h2 style="margin-top:20px;">
        Happy Birthday to me. 🎂🥹
        </h2>

    </div>
    `;
});

</script>

</body>
</html>
